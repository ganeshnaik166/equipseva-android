# Dependabot config — security + scheduled minor/patch updates.
#
# Why this exists: the repo had no automated dep tracking. Android
# lint flagged 105 GradleDependency warnings in the current debug
# build (outdated libs, including some with disclosed CVEs in
# transitive deps). A weekly Dependabot sweep keeps the version
# catalog from drifting further while staying out of the way during
# the launch push by:
#
#   * Grouping minor + patch bumps into a single PR per ecosystem
#     each week so the review tax stays low.
#   * Leaving major bumps OUT of the group — they need a real human
#     decision (AGP, Compose BOM, Hilt, supabase-kt are all in the
#     "manual upgrade" bucket).
#   * Skipping AGP + KSP since the toolchain upgrade involves
#     coordinated changes elsewhere (proguard rules, Hilt KSP
#     processor version, Compose compiler).
#
# Security alerts always open immediately regardless of schedule.

version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gradle"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Toolchain libs — each minor bump can require a coordinated
      # change to gradle-wrapper.properties / proguard-rules / the
      # Kotlin / Compose compiler. Handled by hand via a spike PR.
      # First attempt (Dependabot opened #938 with AGP 8.7 → 8.13 +
      # Kotlin 2.1 → 2.3) failed CI because Gradle wrapper wasn't
      # touched. Block BOTH semver-major AND semver-minor so the
      # weekly sweep stops re-opening these. Patch bumps still flow
      # so security-critical fixes for the toolchain itself land.
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "com.android.library"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # KSP patch bumps (e.g. 2.1.0 → 2.1.21) trigger "unexpected jvm
      # signature V" in Hilt 2.53.1's KSP processor because Hilt's
      # processor was compiled against an exact earlier KSP API
      # surface. Block ALL update types (patch included) until the
      # coordinated Kotlin / Hilt / AGP spike lands. First confirmed
      # in #965 (May 25 Monday sweep).
      - dependency-name: "com.google.devtools.ksp"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      # Same wall — Kotlin patch bumps drag KSP along through the
      # `kotlin` version variable, and the resulting KSP patch breaks
      # Hilt processor compatibility (see KSP entry above).
      - dependency-name: "org.jetbrains.kotlin.android"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "org.jetbrains.kotlin.jvm"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "org.jetbrains.kotlin.plugin.serialization"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      # Hilt — entire com.google.dagger:* family shares the `hilt`
      # version variable in the catalog. Use a wildcard so the
      # ignore catches hilt-android, hilt-android-compiler, AND
      # hilt-android-testing (which a previous version of this rule
      # missed; Dependabot opened #944 with hilt 2.53 → 2.59 in the
      # minor-and-patch group, and CI failed: "Hilt Android Gradle
      # plugin is only compatible with AGP 9.0.0 or higher (found
      # 8.7.3)"). When AGP eventually bumps to 9.x, this rule comes
      # off — but the AGP bump is itself blocked above.
      - dependency-name: "com.google.dagger:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # The Hilt Gradle plugin id (different from the artifact).
      - dependency-name: "com.google.dagger.hilt.android"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Compose BOM minors carry Compose compiler coordination.
      - dependency-name: "androidx.compose:compose-bom"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Lifecycle minors move in lockstep with the Compose BOM and
      # the Kotlin compiler. lifecycle 2.8 → 2.10 was included in
      # #944's group bump alongside the Hilt break; pin the lifecycle
      # version variable too so the next sweep doesn't drift.
      - dependency-name: "androidx.lifecycle:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # kotlinx-* libs are tied to the Kotlin COMPILER plugin version.
      # serialization 1.11 + coroutines 1.11 on the runtime classpath
      # break against compiler-plugin-generated code from Kotlin 2.1.0.
      # First confirmed in the closed #944, repeated in #961 — both
      # surfaced `AbstractMethodError` on Room's `FieldBundle$$serializer`
      # at runtime. Patch bumps still flow.
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-serialization*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-coroutines*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Room's annotation-processor generates code that depends on the
      # kotlinx-serialization classpath. Room 2.8.x pulls in the broken
      # serializer pair when serialization is bumped to 1.11. Pin Room
      # along with the kotlinx-* libs.
      - dependency-name: "androidx.room:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # androidx.navigation minors are tied to lifecycle + Compose BOM.
      # nav-compose 2.9.8 was bundled with the broken set in #961.
      - dependency-name: "androidx.navigation:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # activity-compose minors track the Compose BOM.
      - dependency-name: "androidx.activity:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # androidx.hilt:* (hilt-navigation-compose, hilt-work) follow main
      # Hilt's KSP processor compatibility window. Pin so they don't
      # bring in transitive androidx.concurrent strict-version conflicts
      # (seen on the closed androidx-hilt-1.3 spike).
      - dependency-name: "androidx.hilt:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Kotlin Multiplatform third-party libs: supabase-kt 3.6.0, ktor
      # 3.5.0, and coil 3.4.0 are compiled with Kotlin 2.3.0 binary
      # metadata. Our project pins Kotlin 2.1.0, so adding these libs
      # surfaces:
      #   Module was compiled with an incompatible version of Kotlin.
      #   The binary version of its metadata is 2.3.0, expected 2.1.0.
      # First confirmed in the closed #969 (May 25 Monday sweep across
      # supabase-kt-api, postgrest-kt-api, realtime-kt-api, auth-kt-api,
      # functions-kt-api, storage-kt-api, ktor-client-*). These libs
      # ratchet their compile-against Kotlin minor each release, so any
      # semver-minor brings the wall back. Patch bumps still flow.
      - dependency-name: "io.github.jan-tennert.supabase:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "io.ktor:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "io.coil-kt.coil3:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
