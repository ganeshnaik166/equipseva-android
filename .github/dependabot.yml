# Dependabot config — security + scheduled minor/patch updates.
#
# Why this exists: the repo had no automated dep tracking. Android
# lint flagged 105 GradleDependency warnings in the current debug
# build (outdated libs, including some with disclosed CVEs in
# transitive deps). A weekly Dependabot sweep keeps the version
# catalog from drifting further while staying out of the way during
# the launch push by:
#
#   * Grouping minor + patch bumps into a single PR per ecosystem
#     each week so the review tax stays low.
#   * Leaving major bumps OUT of the group — they need a real human
#     decision (AGP, Compose BOM, Hilt, supabase-kt are all in the
#     "manual upgrade" bucket).
#   * Skipping AGP + KSP since the toolchain upgrade involves
#     coordinated changes elsewhere (proguard rules, Hilt KSP
#     processor version, Compose compiler).
#
# Security alerts always open immediately regardless of schedule.

version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gradle"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Toolchain libs — each minor bump can require a coordinated
      # change to gradle-wrapper.properties / proguard-rules / the
      # Kotlin / Compose compiler. Handled by hand via a spike PR.
      # First attempt (Dependabot opened #938 with AGP 8.7 → 8.13 +
      # Kotlin 2.1 → 2.3) failed CI because Gradle wrapper wasn't
      # touched. Block BOTH semver-major AND semver-minor so the
      # weekly sweep stops re-opening these. Patch bumps still flow
      # so security-critical fixes for the toolchain itself land.
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "com.android.library"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "com.google.devtools.ksp"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "org.jetbrains.kotlin.android"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "org.jetbrains.kotlin.jvm"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "org.jetbrains.kotlin.plugin.serialization"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Hilt's KSP processor must match the Hilt artifact; pin both.
      - dependency-name: "com.google.dagger:hilt-android"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "com.google.dagger:hilt-android-compiler"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "com.google.dagger.hilt.android"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # Compose BOM minors carry Compose compiler coordination.
      - dependency-name: "androidx.compose:compose-bom"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
